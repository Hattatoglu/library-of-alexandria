server:
  port: 80

spring:
  application:
    name: service-auth
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}
    username: ${DB_USERNAME:devuser}
    password: ${DB_PASSWORD:devpass123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  private-key-path: ${JWT_PRIVATE_KEY_PATH:keys/private_key.pem}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:keys/public_key.pem}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXP:900000}       # 15 minutes
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXP:604800000}  # 7 Days

cookie:
  domain: ${COOKIE_DOMAIN:localhost}
  secure: ${COOKIE_SECURE:false}
  same-site: ${COOKIE_SAME_SITE:Strict}
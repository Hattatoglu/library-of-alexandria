server:
  port: 8080

spring:
  application:
    name: service-auth
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:authdb}
    username: ${DB_USERNAME:devuser}
    password: ${DB_PASSWORD:devpass123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  private-key-path: ${JWT_PRIVATE_KEY_PATH:keys/private_key.pem}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:keys/public_key.pem}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXP:900000}       # 15 minutes
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXP:604800000}  # 7 Days

cookie:
  domain: ${COOKIE_DOMAIN:libofalex.com}
  secure: ${COOKIE_SECURE:false}
  same-site: ${COOKIE_SAME_SITE:Strict}

scheduler:
  refresh-token-cleanup:
    cron: ${REFRESH_TOKEN_CLEANUP_CRON:0 0 3 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  private-key-path: keys/private_key.pem
  public-key-path: keys/public_key.pem
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

cookie:
  domain: localhost
  secure: false
  same-site: Strict
